<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 必须保留：适配手机屏幕，不会在手机上变小 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <!-- 网页标题：浏览器标签上显示的文字，可随便改 -->
    <title>我的第一个GitHub网页</title>
    <!-- 网页样式：在这里改颜色、字体、排版 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 50px 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #2563eb;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .intro {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 网页正文：这里的所有文字都可以随便改，不会影响网页运行 -->
        <h1>你好！这是我的第一个GitHub网页</h1>
        <p class="intro">我是GitHub新手，这是我用GitHub Pages做的第一个网页设计作品~</p >
        <div class="card">
            <h2>关于我</h2>
            <p>这里可以写你的自我介绍、作品链接、联系方式</p >
            <p>后续可以在这里添加图片、视频、更多页面，美化你的专属网页</p >
        </div>
    </div>
</body>
</html>
